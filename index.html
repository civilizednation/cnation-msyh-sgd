    <link rel="icon" type="image/png" sizes="192x192" href="./android-chrome-192x192.png">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 기본 파트 체크박스 (전체, 합창) */
        .part-checkbox:checked+div {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

        /* 소프라노 - 핑크 */
        .part-checkbox-sop:checked+div {
            background-color: #ec4899;
            color: white;
            border-color: #ec4899;
        }

        /* 알토 - 보라 */
        .part-checkbox-alto:checked+div {
            background-color: #8b5cf6;
            color: white;
            border-color: #8b5cf6;
        }

        /* 테너 - 초록 */
        .part-checkbox-tenor:checked+div {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }

        /* 베이스 - 주황 */
        .part-checkbox-bass:checked+div {
            background-color: #f97316;
            color: white;
            border-color: #f97316;
        }

        .toggle-checkbox:checked {
            right: 0;
            border-color: #4f46e5;
        }

        .toggle-checkbox:checked+.toggle-label {
            background-color: #4f46e5;
        }

        .toggle-checkbox {
            right: 4;
            z-index: 1;
            border-color: #e5e7eb;
            transition: all 0.3s;
        }

        .toggle-label {
            width: 3rem;
            height: 1.5rem;
            background-color: #e5e7eb;
            border-radius: 9999px;
            transition: all 0.3s;
        }

        /* 파트 배지 색상 */
        .badge-soprano  { background-color: #fce7f3; color: #be185d; }
        .badge-alto     { background-color: #ede9fe; color: #6d28d9; }
        .badge-tenor    { background-color: #d1fae5; color: #065f46; }
        .badge-bass     { background-color: #ffedd5; color: #c2410c; }
        .badge-full     { background-color: #e0e7ff; color: #3730a3; }

        /* 링크 설정 라벨 */
        .label-soprano  { color: #be185d; font-weight: 700; }
        .label-alto     { color: #6d28d9; font-weight: 700; }
        .label-tenor    { color: #065f46; font-weight: 700; }
        .label-bass     { color: #c2410c; font-weight: 700; }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTwOAC_LrrKH8CKepUOTf0pyd9qRv4y_8",
            authDomain: "cnation-project.firebaseapp.com",
            projectId: "cnation-project",
            storageBucket: "cnation-project.firebasestorage.app",
            messagingSenderId: "1004154104261",
            appId: "1:1004154104261:web:0eac4c7ded38262ae5c3ac",
            measurementId: "G-7PW1NSP5EQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const WEEKLY_COL = "cnation-msyh-sgd-weekly";
        const FIXED_COL = "cnation-msyh-sgd-fixed";

        // 파트 선택 로직
        window.handlePartSelection = (checkbox) => {
            const checkboxes = document.querySelectorAll('.part-checkbox');
            if (checkbox.value === '전체' && checkbox.checked) {
                checkboxes.forEach(cb => { if (cb.value !== '전체') cb.checked = false; });
            } else if (checkbox.checked) {
                document.querySelector('.part-checkbox[value="전체"]').checked = false;
            }

            const anyChecked = Array.from(checkboxes).some(cb => cb.checked);
            if (!anyChecked) document.querySelector('.part-checkbox[value="전체"]').checked = true;
        };

        function getSelectedParts() {
            const checkboxes = document.querySelectorAll('.part-checkbox:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        // 화면 전환
        window.goHome = () => {
            document.getElementById('practiceView').classList.add('hidden');
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('pastDateSelector').classList.add('hidden');
            document.getElementById('practiceContainer').innerHTML = '';
            document.getElementById('homeView').classList.remove('hidden');
        };

        window.openSetup = async () => {
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('setupView').classList.remove('hidden');

            document.getElementById('setupDate').value = getNextSunday();
            loadSetupForDate();

            try {
                const docSnap = await getDoc(doc(db, FIXED_COL, "current"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const i = data.introit || {};
                    const p = data.prayer || {};
                    const b = data.benediction || {};

                    document.getElementById('setupIntroitFull').value = i.full || '';
                    document.getElementById('setupIntroitSop').value = i.soprano || '';
                    document.getElementById('setupIntroitAlto').value = i.alto || '';
                    document.getElementById('setupIntroitTenor').value = i.tenor || '';
                    document.getElementById('setupIntroitBass').value = i.bass || '';

                    document.getElementById('setupPrayerFull').value = p.full || '';
                    document.getElementById('setupPrayerSop').value = p.soprano || '';
                    document.getElementById('setupPrayerAlto').value = p.alto || '';
                    document.getElementById('setupPrayerTenor').value = p.tenor || '';
                    document.getElementById('setupPrayerBass').value = p.bass || '';

                    document.getElementById('setupBeneFull').value = b.full || '';
                    document.getElementById('setupBeneSop').value = b.soprano || '';
                    document.getElementById('setupBeneAlto').value = b.alto || '';
                    document.getElementById('setupBeneTenor').value = b.tenor || '';
                    document.getElementById('setupBeneBass').value = b.bass || '';
                }
            } catch (e) { console.error(e); }
        };

        function getYoutubeId(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        window.toggleRepeat = (videoId, partKey, isChecked) => {
            const iframe = document.getElementById(`iframe_${partKey}`);
            if (!iframe) return;
            if (isChecked) {
                iframe.src = `https://www.youtube.com/embed/${videoId}?loop=1&playlist=${videoId}&autoplay=1`;
            } else {
                iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            }
        };

        function getPartBadgeClass(subtitle) {
            if (subtitle === '소프라노') return 'badge-soprano';
            if (subtitle === '알토')    return 'badge-alto';
            if (subtitle === '테너')    return 'badge-tenor';
            if (subtitle === '베이스')  return 'badge-bass';
            return 'badge-full';
        }

        function renderVideo(title, subtitle, videoId, partKey) {
            if (!videoId) return '';
            const badgeClass = getPartBadgeClass(subtitle);
            return `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden mb-4">
                    <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                        <div>
                            <span class="text-xs font-bold px-2 py-1 rounded ${badgeClass}">${subtitle}</span>
                            <h3 class="font-bold text-gray-800 mt-1">${title}</h3>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-gray-500">반복재생</span>
                            <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" id="toggle_${partKey}" onchange="toggleRepeat('${videoId}', '${partKey}', this.checked)" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer"/>
                                <label for="toggle_${partKey}" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                            </div>
                        </div>
                    </div>
                    <div class="aspect-video w-full bg-black relative">
                        <iframe id="iframe_${partKey}" class="absolute inset-0 w-full h-full" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                </div>
            `;
        }

        function getNextSunday(baseDate = new Date()) {
            const d = new Date(baseDate);
            const day = d.getDay();
            const diff = day === 0 ? 0 : 7 - day;
            d.setDate(d.getDate() + diff);
            const offset = d.getTimezoneOffset() * 60000;
            return (new Date(d - offset)).toISOString().split('T')[0];
        }

        window.openPractice = async (type) => {
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('practiceView').classList.remove('hidden');
            const container = document.getElementById('practiceContainer');
            container.innerHTML = '<p class="text-center text-gray-400 py-10"><i class="fas fa-spinner fa-spin mr-2"></i>영상을 불러오는 중...</p>';

            const parts = getSelectedParts();
            const isAll = parts.includes('전체');

            try {
                let html = '';

                if (type === '고정') {
                    document.getElementById('practiceTitle').innerText = '입례/기도/축도송 연습';
                    const docSnap = await getDoc(doc(db, FIXED_COL, "current"));
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        const i = data.introit || {};
                        const p = data.prayer || {};
                        const b = data.benediction || {};

                        html += `<h2 class="font-extrabold text-xl text-indigo-800 mt-6 mb-2 flex items-center gap-2"><i class="fas fa-church"></i> 입례송</h2>`;
                        if (isAll || parts.includes('합창')) html += renderVideo('입례송', '합창', getYoutubeId(i.full), 'i_full');
                        if (isAll || parts.includes('소프라노')) html += renderVideo('입례송', '소프라노', getYoutubeId(i.soprano), 'i_sop');
                        if (isAll || parts.includes('알토')) html += renderVideo('입례송', '알토', getYoutubeId(i.alto), 'i_alto');
                        if (isAll || parts.includes('테너')) html += renderVideo('입례송', '테너', getYoutubeId(i.tenor), 'i_tenor');
                        if (isAll || parts.includes('베이스')) html += renderVideo('입례송', '베이스', getYoutubeId(i.bass), 'i_bass');

                        html += `<h2 class="font-extrabold text-xl text-indigo-800 mt-6 mb-2 flex items-center gap-2"><i class="fas fa-pray"></i> 기도송</h2>`;
                        if (isAll || parts.includes('합창')) html += renderVideo('기도송', '합창', getYoutubeId(p.full), 'p_full');
                        if (isAll || parts.includes('소프라노')) html += renderVideo('기도송', '소프라노', getYoutubeId(p.soprano), 'p_sop');
                        if (isAll || parts.includes('알토')) html += renderVideo('기도송', '알토', getYoutubeId(p.alto), 'p_alto');
                        if (isAll || parts.includes('테너')) html += renderVideo('기도송', '테너', getYoutubeId(p.tenor), 'p_tenor');
                        if (isAll || parts.includes('베이스')) html += renderVideo('기도송', '베이스', getYoutubeId(p.bass), 'p_bass');

                        html += `<h2 class="font-extrabold text-xl text-indigo-800 mt-6 mb-2 flex items-center gap-2"><i class="fas fa-hands-blessing"></i> 축도송</h2>`;
                        if (isAll || parts.includes('합창')) html += renderVideo('축도송', '합창', getYoutubeId(b.full), 'b_full');
                        if (isAll || parts.includes('소프라노')) html += renderVideo('축도송', '소프라노', getYoutubeId(b.soprano), 'b_sop');
                        if (isAll || parts.includes('알토')) html += renderVideo('축도송', '알토', getYoutubeId(b.alto), 'b_alto');
                        if (isAll || parts.includes('테너')) html += renderVideo('축도송', '테너', getYoutubeId(b.tenor), 'b_tenor');
                        if (isAll || parts.includes('베이스')) html += renderVideo('축도송', '베이스', getYoutubeId(b.bass), 'b_bass');
                    }
                }
                else {
                    const thisSunday = getNextSunday();
                    const d = new Date(thisSunday);
                    d.setDate(d.getDate() + 7);
                    const nextSunday = d.toISOString().split('T')[0];

                    const datesToFetch = [];
                    if (type === '이번주' || type === '이번주_다음주') datesToFetch.push(thisSunday);
                    if (type === '다음주' || type === '이번주_다음주') datesToFetch.push(nextSunday);

                    document.getElementById('practiceTitle').innerText = type.replace('_', ', ') + ' 곡 연습';

                    for (const date of datesToFetch) {
                        const docSnap = await getDoc(doc(db, WEEKLY_COL, date));
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            const title = data.title || `${date} 찬양`;
                            html += `<h2 class="font-extrabold text-xl text-indigo-800 mt-6 mb-2 flex items-center gap-2"><i class="fas fa-calendar-check"></i> ${date}</h2>`;
                            if (isAll || parts.includes('합창')) html += renderVideo(title, '합창', getYoutubeId(data.full), `full_${date}`);
                            if (isAll || parts.includes('소프라노')) html += renderVideo(title, '소프라노', getYoutubeId(data.soprano), `sop_${date}`);
                            if (isAll || parts.includes('알토')) html += renderVideo(title, '알토', getYoutubeId(data.alto), `alto_${date}`);
                            if (isAll || parts.includes('테너')) html += renderVideo(title, '테너', getYoutubeId(data.tenor), `tenor_${date}`);
                            if (isAll || parts.includes('베이스')) html += renderVideo(title, '베이스', getYoutubeId(data.bass), `bass_${date}`);
                        } else {
                            html += `<div class="bg-gray-100 p-6 rounded-xl text-center text-gray-500 mb-6 border border-gray-200"><i class="fas fa-exclamation-circle mb-2 text-xl"></i><br>${date} 곡이 아직 등록되지 않았습니다.</div>`;
                        }
                    }
                }
                container.innerHTML = html || '<p class="text-center text-gray-400 py-10">해당 파트에 등록된 영상이 없습니다.</p>';
            } catch (e) {
                container.innerHTML = '<p class="text-center text-red-400 py-10">데이터를 불러오지 못했습니다.</p>';
            }
        };

        window.openPastPractice = async () => {
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('practiceView').classList.remove('hidden');
            document.getElementById('pastDateSelector').classList.remove('hidden');
            document.getElementById('practiceTitle').innerText = '기존 곡 연습';
            const container = document.getElementById('practiceContainer');
            container.innerHTML = '<p class="text-center text-gray-400 py-10">위에서 날짜를 선택해주세요.</p>';
            const dropdown = document.getElementById('pastDateDropdown');
            dropdown.innerHTML = '<option value="">날짜 목록 불러오는 중...</option>';
            try {
                const q = query(collection(db, WEEKLY_COL));
                const snap = await getDocs(q);
                let dates = [];
                snap.forEach(doc => dates.push({ date: doc.id, title: doc.data().title || '' }));
                dates.sort((a, b) => b.date.localeCompare(a.date));
                dropdown.innerHTML = '<option value="">날짜(일요일)를 선택하세요</option>';
                dates.forEach(item => {
                    dropdown.innerHTML += `<option value="${item.date}">${item.date} ${item.title ? '- ' + item.title : ''}</option>`;
                });
            } catch (e) { dropdown.innerHTML = '<option value="">불러오기 실패</option>'; }
        };

        window.loadPastPractice = async () => {
            const date = document.getElementById('pastDateDropdown').value;
            const container = document.getElementById('practiceContainer');
            if (!date) { container.innerHTML = ''; return; }
            container.innerHTML = '<p class="text-center text-gray-400 py-10"><i class="fas fa-spinner fa-spin mr-2"></i>영상을 불러오는 중...</p>';
            const parts = getSelectedParts();
            const isAll = parts.includes('전체');
            try {
                const docSnap = await getDoc(doc(db, WEEKLY_COL, date));
                let html = '';
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const title = data.title || `${date} 찬양`;
                    if (isAll || parts.includes('합창')) html += renderVideo(title, '합창', getYoutubeId(data.full), `full_${date}`);
                    if (isAll || parts.includes('소프라노')) html += renderVideo(title, '소프라노', getYoutubeId(data.soprano), `sop_${date}`);
                    if (isAll || parts.includes('알토')) html += renderVideo(title, '알토', getYoutubeId(data.alto), `alto_${date}`);
                    if (isAll || parts.includes('테너')) html += renderVideo(title, '테너', getYoutubeId(data.tenor), `tenor_${date}`);
                    if (isAll || parts.includes('베이스')) html += renderVideo(title, '베이스', getYoutubeId(data.bass), `bass_${date}`);
                }
                container.innerHTML = html || '<p class="text-center text-gray-400 py-10">해당 파트에 등록된 영상이 없습니다.</p>';
            } catch (e) { container.innerHTML = '<p class="text-center text-red-400 py-10">데이터 로드 실패.</p>'; }
        };

        window.loadSetupForDate = async () => {
            const date = document.getElementById('setupDate').value;
            if (!date) return;
            try {
                const docSnap = await getDoc(doc(db, WEEKLY_COL, date));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('setupTitle').value = data.title || '';
                    document.getElementById('setupFull').value = data.full || '';
                    document.getElementById('setupSop').value = data.soprano || '';
                    document.getElementById('setupAlto').value = data.alto || '';
                    document.getElementById('setupTenor').value = data.tenor || '';
                    document.getElementById('setupBass').value = data.bass || '';
                } else {
                    document.getElementById('setupTitle').value = '';
                    document.getElementById('setupFull').value = '';
                    document.getElementById('setupSop').value = '';
                    document.getElementById('setupAlto').value = '';
                    document.getElementById('setupTenor').value = '';
                    document.getElementById('setupBass').value = '';
                }
            } catch (e) { console.error(e); }
        };

        window.saveWeeklyLinks = async () => {
            const date = document.getElementById('setupDate').value;
            if (!date) { alert("날짜를 선택해주세요."); return; }
            const btn = document.getElementById('saveWeeklyBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 저장중...';
            btn.disabled = true;
            try {
                await setDoc(doc(db, WEEKLY_COL, date), {
                    title: document.getElementById('setupTitle').value,
                    full: document.getElementById('setupFull').value,
                    soprano: document.getElementById('setupSop').value,
                    alto: document.getElementById('setupAlto').value,
                    tenor: document.getElementById('setupTenor').value,
                    bass: document.getElementById('setupBass').value
                });
                alert(`${date} 링크가 성공적으로 저장되었습니다.`);
            } catch (e) { alert("저장 실패. 네트워크를 확인해주세요."); }
            finally { btn.innerHTML = '주일 찬양 저장'; btn.disabled = false; }
        };

        window.saveFixedLinks = async () => {
            const btn = document.getElementById('saveFixedBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 저장중...';
            btn.disabled = true;
            try {
                await setDoc(doc(db, FIXED_COL, "current"), {
                    introit: {
                        full: document.getElementById('setupIntroitFull').value,
                        soprano: document.getElementById('setupIntroitSop').value,
                        alto: document.getElementById('setupIntroitAlto').value,
                        tenor: document.getElementById('setupIntroitTenor').value,
                        bass: document.getElementById('setupIntroitBass').value
                    },
                    prayer: {
                        full: document.getElementById('setupPrayerFull').value,
                        soprano: document.getElementById('setupPrayerSop').value,
                        alto: document.getElementById('setupPrayerAlto').value,
                        tenor: document.getElementById('setupPrayerTenor').value,
                        bass: document.getElementById('setupPrayerBass').value
                    },
                    benediction: {
                        full: document.getElementById('setupBeneFull').value,
                        soprano: document.getElementById('setupBeneSop').value,
                        alto: document.getElementById('setupBeneAlto').value,
                        tenor: document.getElementById('setupBeneTenor').value,
                        bass: document.getElementById('setupBeneBass').value
                    }
                });
                alert(`고정곡 15개 파트 링크가 성공적으로 저장되었습니다.`);
            } catch (e) { alert("저장 실패. 네트워크를 확인해주세요."); }
            finally { btn.innerHTML = '고정곡 저장'; btn.disabled = false; }
        };
    </script>
</body>

</html>
