<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>무석연합교회 성가대 연습</title>

    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./android-chrome-512x512.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="성가대연습">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        .part-checkbox:checked+div {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

        .part-checkbox-sop:checked+div {
            background-color: #ec4899;
            color: white;
            border-color: #ec4899;
        }

        .part-checkbox-alto:checked+div {
            background-color: #8b5cf6;
            color: white;
            border-color: #8b5cf6;
        }

        .part-checkbox-tenor:checked+div {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }

        .part-checkbox-bass:checked+div {
            background-color: #f97316;
            color: white;
            border-color: #f97316;
        }

        .toggle-checkbox:checked {
            right: 0;
            border-color: #4f46e5;
        }

        .toggle-checkbox:checked+.toggle-label {
            background-color: #4f46e5;
        }

        .toggle-checkbox {
            right: 4;
            z-index: 1;
            border-color: #e5e7eb;
            transition: all 0.3s;
        }

        .toggle-label {
            width: 3rem;
            height: 1.5rem;
            background-color: #e5e7eb;
            border-radius: 9999px;
            transition: all 0.3s;
        }

        .badge-soprano {
            background-color: #fce7f3;
            color: #be185d;
        }

        .badge-alto {
            background-color: #ede9fe;
            color: #6d28d9;
        }

        .badge-tenor {
            background-color: #d1fae5;
            color: #065f46;
        }

        .badge-bass {
            background-color: #ffedd5;
            color: #c2410c;
        }

        .badge-full {
            background-color: #e0e7ff;
            color: #3730a3;
        }

        .label-soprano {
            color: #be185d;
            font-weight: 700;
        }

        .label-alto {
            color: #6d28d9;
            font-weight: 700;
        }

        .label-tenor {
            color: #065f46;
            font-weight: 700;
        }

        .label-bass {
            color: #c2410c;
            font-weight: 700;
        }
    </style>
</head>

<body class="bg-gray-100 font-sans text-gray-800 pb-20">

    <div class="w-full max-w-5xl mx-auto bg-white min-h-screen shadow-2xl relative overflow-x-hidden">

        <div id="homeView" class="flex flex-col min-h-screen bg-indigo-50 p-6 relative">
            <div class="flex-1 flex flex-col items-center justify-center">
                <img src="msyhsgd.jpg" alt="무석연합교회 성가대" class="w-full max-w-xs mb-8 object-contain rounded-xl"
                    onerror="this.src='https://via.placeholder.com/300x150?text=Choir+Image'">

                <div class="w-full max-w-2xl bg-white p-4 rounded-2xl shadow-sm border border-indigo-100 mb-6">
                    <h3 class="text-xs font-bold text-gray-500 mb-3 uppercase tracking-wider text-center">연습할 파트 설정 (복수
                        선택)</h3>
                    <div class="flex flex-wrap justify-center gap-2" id="partSelectionContainer">
                        <label class="cursor-pointer"><input type="checkbox" value="전체" class="hidden part-checkbox"
                                onchange="handlePartSelection(this)" checked>
                            <div
                                class="px-4 py-2 rounded-full border border-gray-200 text-sm font-bold text-gray-600 transition-colors">
                                전체</div>
                        </label>
                        <label class="cursor-pointer"><input type="checkbox" value="합창" class="hidden part-checkbox"
                                onchange="handlePartSelection(this)">
                            <div
                                class="px-4 py-2 rounded-full border border-gray-200 text-sm font-bold text-gray-600 transition-colors">
                                합창</div>
                        </label>
                        <label class="cursor-pointer"><input type="checkbox" value="소프라노"
                                class="hidden part-checkbox part-checkbox-sop" onchange="handlePartSelection(this)">
                            <div
                                class="px-4 py-2 rounded-full border border-pink-200 text-sm font-bold text-pink-500 transition-colors">
                                소프라노</div>
                        </label>
                        <label class="cursor-pointer"><input type="checkbox" value="알토"
                                class="hidden part-checkbox part-checkbox-alto" onchange="handlePartSelection(this)">
                            <div
                                class="px-4 py-2 rounded-full border border-violet-200 text-sm font-bold text-violet-500 transition-colors">
                                알토</div>
                        </label>
                        <label class="cursor-pointer"><input type="checkbox" value="테너"
                                class="hidden part-checkbox part-checkbox-tenor" onchange="handlePartSelection(this)">
                            <div
                                class="px-4 py-2 rounded-full border border-emerald-200 text-sm font-bold text-emerald-600 transition-colors">
                                테너</div>
                        </label>
                        <label class="cursor-pointer"><input type="checkbox" value="베이스"
                                class="hidden part-checkbox part-checkbox-bass" onchange="handlePartSelection(this)">
                            <div
                                class="px-4 py-2 rounded-full border border-orange-200 text-sm font-bold text-orange-500 transition-colors">
                                베이스</div>
                        </label>
                    </div>
                </div>

                <div class="w-full max-w-2xl">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <button onclick="openPractice('이번주')"
                            class="w-full py-4 bg-white rounded-xl shadow-sm border border-indigo-100 text-gray-800 font-bold hover:shadow-md transition flex items-center justify-between px-6">
                            <span class="flex items-center gap-3"><i class="fas fa-calendar-day text-indigo-400"></i>
                                이번주 곡</span><i class="fas fa-chevron-right text-gray-300"></i>
                        </button>
                        <button onclick="openPractice('다음주')"
                            class="w-full py-4 bg-white rounded-xl shadow-sm border border-indigo-100 text-gray-800 font-bold hover:shadow-md transition flex items-center justify-between px-6">
                            <span class="flex items-center gap-3"><i class="fas fa-calendar-week text-indigo-400"></i>
                                다음주 곡</span><i class="fas fa-chevron-right text-gray-300"></i>
                        </button>
                        <button onclick="openPractice('이번주_다음주')"
                            class="w-full py-4 bg-white rounded-xl shadow-sm border border-indigo-100 text-gray-800 font-bold hover:shadow-md transition flex items-center justify-between px-6 md:col-span-2">
                            <span class="flex items-center gap-3"><i class="fas fa-layer-group text-indigo-400"></i> 이번주
                                + 다음주 곡 연습</span><i class="fas fa-chevron-right text-gray-300"></i>
                        </button>
                        <button onclick="openPastPractice()"
                            class="w-full py-4 bg-white rounded-xl shadow-sm border border-indigo-100 text-gray-800 font-bold hover:shadow-md transition flex items-center justify-between px-6">
                            <span class="flex items-center gap-3"><i class="fas fa-history text-indigo-400"></i> 기존 곡
                                연습</span><i class="fas fa-chevron-right text-gray-300"></i>
                        </button>
                        <button onclick="openPractice('고정')"
                            class="w-full py-4 bg-white rounded-xl shadow-sm border border-indigo-100 text-gray-800 font-bold hover:shadow-md transition flex items-center justify-between px-6">
                            <span class="flex items-center gap-3"><i class="fas fa-church text-indigo-400"></i> 고정송
                                (입례/기도/축도)</span><i class="fas fa-chevron-right text-gray-300"></i>
                        </button>
                    </div>

                    <div class="pt-4 border-t border-indigo-200 mt-6">
                        <button onclick="openSetup()"
                            class="w-full py-4 bg-gray-800 rounded-xl shadow-md text-white font-bold hover:bg-gray-900 transition flex items-center justify-center gap-2">
                            <i class="fas fa-link"></i> 관리자 설정 (링크 및 악보)
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="practiceView" class="hidden flex flex-col min-h-screen bg-gray-50 pb-10">
            <div class="bg-indigo-600 text-white p-4 flex items-center justify-between shadow-md sticky top-0 z-10">
                <button onclick="goHome()" class="text-xl px-2 hover:scale-110 transition-transform"><i
                        class="fas fa-arrow-left"></i></button>
                <h2 id="practiceTitle" class="font-bold text-lg tracking-wide">곡 연습</h2>
                <div class="w-8"></div>
            </div>

            <div id="pastDateSelector" class="hidden p-4 bg-white shadow-sm z-0 relative border-b border-gray-100">
                <div class="max-w-2xl mx-auto">
                    <select id="pastDateDropdown"
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-center font-bold text-gray-700 focus:outline-none focus:border-indigo-500"
                        onchange="loadPastPractice()">
                        <option value="">날짜(일요일)를 선택하세요</option>
                    </select>
                </div>
            </div>

            <div id="practiceContainer" class="flex-1 p-4 md:p-6 overflow-y-auto">
            </div>
        </div>

        <div id="setupView" class="hidden flex flex-col min-h-screen bg-gray-50 pb-20">
            <div class="bg-gray-800 text-white p-4 flex items-center justify-between shadow-md sticky top-0 z-10">
                <button onclick="goHome()" class="text-xl px-2 hover:scale-110 transition-transform"><i
                        class="fas fa-arrow-left"></i></button>
                <h2 class="font-bold text-lg tracking-wide">설정 (링크 및 악보)</h2>
                <div class="w-8"></div>
            </div>

            <div class="flex-1 p-4 md:p-6 space-y-6 overflow-y-auto max-w-4xl mx-auto w-full">
                <div class="bg-white p-5 md:p-8 rounded-2xl shadow-sm border border-gray-200">
                    <h3 class="font-bold text-lg text-indigo-700 mb-4 border-b border-gray-100 pb-2"><i
                            class="fas fa-calendar-alt mr-2"></i>주일 찬양 설정</h3>

                    <div class="space-y-5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">적용 날짜 (일요일)</label>
                                <input type="date" id="setupDate"
                                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none"
                                    onchange="loadSetupForDate()">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">찬양 제목</label>
                                <input type="text" id="setupTitle" placeholder="예: 나를 부르신 이유"
                                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none">
                            </div>
                        </div>

                        <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                            <label class="block text-sm font-bold text-indigo-800 mb-2"><i
                                    class="fas fa-file-pdf mr-1 text-red-500"></i>악보 첨부 (PDF)</label>
                            <input type="file" id="setupSheetMusic" accept="application/pdf"
                                class="w-full text-sm mt-1 file:mr-4 file:py-2.5 file:px-5 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-indigo-100 file:text-indigo-700 hover:file:bg-indigo-200 cursor-pointer transition">
                            <div id="currentSheetMusicStatus" class="text-xs text-gray-500 mt-2 italic">현재 등록된 악보가 없습니다.
                            </div>
                        </div>

                        <div
                            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pt-4 border-t border-dashed border-gray-200 mt-2">
                            <div class="flex items-center gap-2"><span
                                    class="w-14 text-xs font-bold text-indigo-600 text-right">합창</span><input
                                    type="text" id="setupFull" placeholder="유튜브 링크"
                                    class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:border-indigo-500 outline-none">
                            </div>
                            <div class="flex items-center gap-2"><span
                                    class="w-14 text-xs label-soprano text-right">소프라노</span><input type="text"
                                    id="setupSop" placeholder="유튜브 링크"
                                    class="flex-1 border border-pink-200 rounded-lg px-3 py-2 text-sm focus:border-pink-400 outline-none">
                            </div>
                            <div class="flex items-center gap-2"><span
                                    class="w-14 text-xs label-alto text-right">알토</span><input type="text"
                                    id="setupAlto" placeholder="유튜브 링크"
                                    class="flex-1 border border-violet-200 rounded-lg px-3 py-2 text-sm focus:border-violet-400 outline-none">
                            </div>
                            <div class="flex items-center gap-2"><span
                                    class="w-14 text-xs label-tenor text-right">테너</span><input type="text"
                                    id="setupTenor" placeholder="유튜브 링크"
                                    class="flex-1 border border-emerald-200 rounded-lg px-3 py-2 text-sm focus:border-emerald-400 outline-none">
                            </div>
                            <div class="flex items-center gap-2"><span
                                    class="w-14 text-xs label-bass text-right">베이스</span><input type="text"
                                    id="setupBass" placeholder="유튜브 링크"
                                    class="flex-1 border border-orange-200 rounded-lg px-3 py-2 text-sm focus:border-orange-400 outline-none">
                            </div>
                        </div>

                        <button onclick="saveWeeklyLinks()" id="saveWeeklyBtn"
                            class="w-full mt-6 py-4 bg-indigo-600 text-white text-lg font-bold rounded-xl shadow-md hover:bg-indigo-700 transition">
                            주일 찬양 및 악보 저장
                        </button>
                    </div>
                </div>

                <div class="bg-white p-5 md:p-8 rounded-2xl shadow-sm border border-gray-200">
                    <h3 class="font-bold text-lg text-gray-800 mb-2 border-b border-gray-100 pb-2"><i
                            class="fas fa-church mr-2"></i>고정곡 파트별 링크 입력</h3>
                    <p class="text-[11px] text-gray-400 mb-4">한번 입력해두면 계속 유지됩니다.</p>

                    <div class="space-y-6">
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <h4 class="text-sm font-bold text-indigo-700 mb-3 flex items-center gap-2"><i
                                    class="fas fa-caret-right"></i> 입례송</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] font-bold text-indigo-600 text-right">합창</span><input
                                        type="text" id="setupIntroitFull"
                                        class="flex-1 border border-gray-300 rounded-md px-2 py-1.5 text-xs focus:border-indigo-500 outline-none">
                                </div>
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] label-soprano text-right">소프라노</span><input type="text"
                                        id="setupIntroitSop"
                                        class="flex-1 border border-pink-200 rounded-md px-2 py-1.5 text-xs focus:border-pink-400 outline-none">
                                </div>
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] label-alto text-right">알토</span><input type="text"
                                        id="setupIntroitAlto"
                                        class="flex-1 border border-violet-200 rounded-md px-2 py-1.5 text-xs focus:border-violet-400 outline-none">
                                </div>
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] label-tenor text-right">테너</span><input type="text"
                                        id="setupIntroitTenor"
                                        class="flex-1 border border-emerald-200 rounded-md px-2 py-1.5 text-xs focus:border-emerald-400 outline-none">
                                </div>
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] label-bass text-right">베이스</span><input type="text"
                                        id="setupIntroitBass"
                                        class="flex-1 border border-orange-200 rounded-md px-2 py-1.5 text-xs focus:border-orange-400 outline-none">
                                </div>
                            </div>
                        </div>

                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <h4 class="text-sm font-bold text-indigo-700 mb-3 flex items-center gap-2"><i
                                    class="fas fa-caret-right"></i> 기도송</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] font-bold text-indigo-600 text-right">합창</span><input
                                        type="text" id="setupPrayerFull"
                                        class="flex-1 border border-gray-300 rounded-md px-2 py-1.5 text-xs focus:border-indigo-500 outline-none">
                                </div>
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] label-soprano text-right">소프라노</span><input type="text"
                                        id="setupPrayerSop"
                                        class="flex-1 border border-pink-200 rounded-md px-2 py-1.5 text-xs focus:border-pink-400 outline-none">
                                </div>
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] label-alto text-right">알토</span><input type="text"
                                        id="setupPrayerAlto"
                                        class="flex-1 border border-violet-200 rounded-md px-2 py-1.5 text-xs focus:border-violet-400 outline-none">
                                </div>
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] label-tenor text-right">테너</span><input type="text"
                                        id="setupPrayerTenor"
                                        class="flex-1 border border-emerald-200 rounded-md px-2 py-1.5 text-xs focus:border-emerald-400 outline-none">
                                </div>
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] label-bass text-right">베이스</span><input type="text"
                                        id="setupPrayerBass"
                                        class="flex-1 border border-orange-200 rounded-md px-2 py-1.5 text-xs focus:border-orange-400 outline-none">
                                </div>
                            </div>
                        </div>

                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <h4 class="text-sm font-bold text-indigo-700 mb-3 flex items-center gap-2"><i
                                    class="fas fa-caret-right"></i> 축도송</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] font-bold text-indigo-600 text-right">합창</span><input
                                        type="text" id="setupBeneFull"
                                        class="flex-1 border border-gray-300 rounded-md px-2 py-1.5 text-xs focus:border-indigo-500 outline-none">
                                </div>
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] label-soprano text-right">소프라노</span><input type="text"
                                        id="setupBeneSop"
                                        class="flex-1 border border-pink-200 rounded-md px-2 py-1.5 text-xs focus:border-pink-400 outline-none">
                                </div>
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] label-alto text-right">알토</span><input type="text"
                                        id="setupBeneAlto"
                                        class="flex-1 border border-violet-200 rounded-md px-2 py-1.5 text-xs focus:border-violet-400 outline-none">
                                </div>
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] label-tenor text-right">테너</span><input type="text"
                                        id="setupBeneTenor"
                                        class="flex-1 border border-emerald-200 rounded-md px-2 py-1.5 text-xs focus:border-emerald-400 outline-none">
                                </div>
                                <div class="flex items-center gap-2"><span
                                        class="w-12 text-[11px] label-bass text-right">베이스</span><input type="text"
                                        id="setupBeneBass"
                                        class="flex-1 border border-orange-200 rounded-md px-2 py-1.5 text-xs focus:border-orange-400 outline-none">
                                </div>
                            </div>
                        </div>
                        <button onclick="saveFixedLinks()" id="saveFixedBtn"
                            class="w-full mt-6 py-4 bg-gray-800 text-white text-lg font-bold rounded-xl shadow-md hover:bg-gray-900 transition">
                            고정곡 저장
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="pdfModal" class="hidden fixed inset-0 z-50 bg-gray-900 flex flex-col">
            <div class="bg-gray-800 text-white p-4 flex items-center justify-between shadow-md">
                <h3 id="pdfModalTitle" class="font-bold text-sm tracking-wide flex-1 truncate pr-4">악보 크게보기</h3>
                <button onclick="closePdfModal()"
                    class="text-white text-2xl px-2 hover:text-red-400 transition-colors"><i
                        class="fas fa-times"></i></button>
            </div>
            <div id="pdfModalContent"
                class="flex-1 overflow-y-auto overflow-x-auto p-2 bg-gray-900 flex flex-col items-center gap-2">
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;

        async function loadPdfToCanvas(url, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '<p class="text-indigo-500 py-10 text-center text-sm font-bold"><i class="fas fa-spinner fa-spin mr-2"></i>악보를 페이지별로 그리는 중...</p>';

            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                container.innerHTML = '';

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 1.5 });

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    canvas.className = 'w-full h-auto bg-white shadow-md border border-gray-300 rounded mb-4 max-w-full';

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    container.appendChild(canvas);
                }
            } catch (error) {
                console.error('PDF Load Error:', error);
                container.innerHTML = '<p class="text-red-500 py-10 text-center text-xs">악보를 불러올 수 없습니다.<br>(Firebase Storage의 CORS 설정이 필요할 수 있습니다)</p>';
            }
        }

        }

                    if (data.sheetMusicUrl) {
                        currentSheetMusicUrl = data.sheetMusicUrl;
                        statusEl.innerHTML = `<span class="text-indigo-600 font-bold"><i class="fas fa-check-circle mr-1"></i>기존 악보가 등록되어 있습니다.</span> (새 파일 첨부시 덮어씀)`;
                    } else {
                        statusEl.innerHTML = `등록된 악보가 없습니다.`;
                    }
                } else {
                    document.getElementById('setupTitle').value = '';
                    document.getElementById('setupFull').value = '';
                    document.getElementById('setupSop').value = '';
                    document.getElementById('setupAlto').value = '';
                    document.getElementById('setupTenor').value = '';
                    document.getElementById('setupBass').value = '';
                    statusEl.innerHTML = `등록된 악보가 없습니다.`;
                }
            } catch (e) { console.error(e); }
        };

        window.saveWeeklyLinks = async () => {
            const date = document.getElementById('setupDate').value;
            if (!date) { alert("날짜를 선택해주세요."); return; }

            const btn = document.getElementById('saveWeeklyBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 파일 업로드 및 저장중...';
            btn.disabled = true;

            try {
                const fileInput = document.getElementById('setupSheetMusic');
                let finalSheetMusicUrl = currentSheetMusicUrl;

                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const storageRef = ref(storage, `sheet_music/${date}_${file.name}`);
                    await uploadBytes(storageRef, file);
                    finalSheetMusicUrl = await getDownloadURL(storageRef);
                }

                await setDoc(doc(db, WEEKLY_COL, date), {
                    title: document.getElementById('setupTitle').value,
                    full: document.getElementById('setupFull').value,
                    soprano: document.getElementById('setupSop').value,
                    alto: document.getElementById('setupAlto').value,
                    tenor: document.getElementById('setupTenor').value,
                    bass: document.getElementById('setupBass').value,
                    sheetMusicUrl: finalSheetMusicUrl
                });

                alert(`${date} 찬양 링크 및 악보가 성공적으로 저장되었습니다.`);
                loadSetupForDate();
            } catch (e) {
                console.error(e);
                alert("저장 실패. 네트워크 또는 파일 크기를 확인해주세요.");
            }
            finally {
                btn.innerHTML = '주일 찬양 및 악보 저장';
                btn.disabled = false;
            }
        };

        window.saveFixedLinks = async () => {
            const btn = document.getElementById('saveFixedBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 저장중...';
            btn.disabled = true;
            try {
                await setDoc(doc(db, FIXED_COL, "current"), {
                    introit: {
                        full: document.getElementById('setupIntroitFull').value,
                        soprano: document.getElementById('setupIntroitSop').value,
                        alto: document.getElementById('setupIntroitAlto').value,
                        tenor: document.getElementById('setupIntroitTenor').value,
                        bass: document.getElementById('setupIntroitBass').value
                    },
                    prayer: {
                        full: document.getElementById('setupPrayerFull').value,
                        soprano: document.getElementById('setupPrayerSop').value,
                        alto: document.getElementById('setupPrayerAlto').value,
                        tenor: document.getElementById('setupPrayerTenor').value,
                        bass: document.getElementById('setupPrayerBass').value
                    },
                    benediction: {
                        full: document.getElementById('setupBeneFull').value,
                        soprano: document.getElementById('setupBeneSop').value,
                        alto: document.getElementById('setupBeneAlto').value,
                        tenor: document.getElementById('setupBeneTenor').value,
                        bass: document.getElementById('setupBeneBass').value
                    }
                });
                alert(`고정곡 15개 파트 링크가 성공적으로 저장되었습니다.`);
            } catch (e) { alert("저장 실패. 네트워크를 확인해주세요."); }
            finally { btn.innerHTML = '고정곡 저장'; btn.disabled = false; }
        };
    </script>
</body>

</html>
